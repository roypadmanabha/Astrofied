<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Astrofied Gemstones | Certified Vedic Gemstone Remedies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>
      <style>
        /* Full-screen opaque viewport blocking overlay */
        .noscript-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: radial-gradient(circle at center, #0a0520 0%, #030014 100%);
          z-index: 9999999;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #ffffff;
          font-family: 'Nunito', 'Mulish', system-ui, -apple-system, sans-serif;
          text-align: center;
          padding: 24px;
          box-sizing: border-box;
        }
        .noscript-card {
          background: rgba(255, 255, 255, 0.02);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 24px;
          padding: 3rem 2rem;
          max-width: 480px;
          width: 100%;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .noscript-logo {
          width: 80px;
          height: 80px;
          margin-bottom: 2rem;
          border-radius: 50%;
          border: 2px solid rgba(255, 215, 0, 0.3);
          box-shadow: 0 0 30px rgba(255, 215, 0, 0.25);
        }
        .noscript-title {
          font-size: 1.75rem;
          font-weight: 800;
          color: #ffd700;
          margin: 0 0 1rem 0;
          letter-spacing: 0.05em;
          text-shadow: 0 2px 10px rgba(255, 215, 0, 0.15);
        }
        .noscript-message {
          font-size: 1.05rem;
          color: #e2e8f0;
          line-height: 1.6;
          margin: 0;
          font-weight: 500;
        }
        /* Strict hidden override for standard app layout container */
        #root {
          display: none !important;
        }
      </style>
      <div class="noscript-overlay">
        <div class="noscript-card">
          <img src="/logo.png" alt="Astrofied Logo" class="noscript-logo" />
          <h1 class="noscript-title">JavaScript Required</h1>
          <p class="noscript-message">Please enable JavaScript to view this secure content.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
